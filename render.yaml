services:
  - type: web
    name: cropguard-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///site.db
